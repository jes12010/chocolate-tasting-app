<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chocolate Tasting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    body {
      background: #3b2f2f;
      color: #f7e7d3;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }
    h1, h2 {
      text-align: center;
      margin-top: 20px;
    }
    .container {
      width: 90%;
      margin: auto;
      max-width: 700px;
    }
    .hidden { display: none; }

    /* LANDING PAGE BUTTONS */
    .landing-buttons button {
      width: 100%;
      padding: 20px;
      margin: 15px 0;
      font-size: 22px;
      background: #5a3e36;
      border: none;
      color: #f7e7d3;
      border-radius: 10px;
      cursor: pointer;
    }
    .landing-buttons button:hover {
      background: #d4a373;
      color: #3b2f2f;
    }

    /* SLIDERS */
    .slider-group { margin: 20px 0; }
    .slider-group label { display: block; margin-bottom: 5px; }

    /* DESCRIPTOR BUTTONS */
    .descriptor-buttons button {
      margin: 5px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      color: #3b2f2f;
      cursor: pointer;
      font-weight: bold;
    }
    .descriptor-buttons button.selected {
      outline: 2px solid #fff;
    }

    /* TABS */
    .tabs {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .tabs button {
      margin: 0 10px;
      padding: 8px 16px;
      background: #5a3e36;
      border: none;
      color: #f7e7d3;
      border-radius: 6px;
      cursor: pointer;
    }
    .tabs button.active {
      background: #d4a373;
      color: #3b2f2f;
    }

    /* VISUALS GRID */
    .visuals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .visual-box {
      background: #4a3a36;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    /* SESSION MODAL */
    #sessionModal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #sessionCard {
      background: #4a332d;
      border: 2px solid #d4a373;
      padding: 30px;
      border-radius: 12px;
      width: 80%;
      max-width: 350px;
      text-align: center;
      color: #f7e7d3;
    }
    #sessionCard input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    #startSessionBtn {
      margin-top: 20px;
      padding: 10px 16px;
      background: #d4a373;
      border: none;
      color: #3b2f2f;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Chocolate Tasting</h1>

  <!-- SESSION ID + USER ID MODAL -->
  <div id="sessionModal">
    <div id="sessionCard">
      <h2>Enter Session ID</h2>
      <input id="sessionInput" type="text" placeholder="e.g. groupA" />

      <h3>Your User ID</h3>
      <input id="userIdInput" type="text" readonly />

      <button id="startSessionBtn">Start Session</button>
    </div>
  </div>

  <!-- LANDING PAGE -->
<div id="page-select" class="container">
  <h2>Select Your Chocolate</h2>
  <div class="landing-buttons">
    <button class="choc-btn" data-choc-id="choc1">Chocolate 1</button>
    <button class="choc-btn" data-choc-id="choc2">Chocolate 2</button>
    <button class="choc-btn" data-choc-id="choc3">Chocolate 3</button>
    <button class="choc-btn" data-choc-id="choc4">Chocolate 4</button>
  </div>
</div>

<!-- TASTING PAGE -->
<div id="page-ratings" class="container hidden">
  <h2 id="choc-title"></h2>

  <div class="tabs">
    <button id="tab-my" class="active">My Ratings</button>
    <button id="tab-all">Everyone's Ratings</button>
  </div>

  <!-- BASIC TASTES -->
  <h3>Basic Taste Sliders</h3>
  <div id="basic-sliders"></div>

  <div id="basic-plot-section" class="visual-box">
    <canvas id="basicRadar"></canvas>
  </div>

  <!-- MOUTHFEEL -->
  <h3>Mouthfeel</h3>
  <div id="mouthfeel-buttons" class="descriptor-buttons"></div>

  <div id="mouthfeel-cloud-section" class="visual-box">
    <div id="mouthfeelCloud"></div>
  </div>

  <!-- AROMAS -->
  <h3>Aromas</h3>
  <div id="aroma-sliders"></div>

  <div id="aroma-plot-section" class="visual-box">
    <canvas id="aromaRadar"></canvas>
  </div>

  <div id="aroma-cloud-section" class="visual-box">
    <div id="aromaCloud"></div>
  </div>

  <!-- NAVIGATION BUTTONS -->
  <div id="nav-buttons" style="margin-top: 30px; text-align: center;">
    <button id="prevChocolate" class="nav-btn">Previous</button>
    <button id="nextChocolate" class="nav-btn">Next</button>
  </div>
</div>

<script>
/***********************
 * CONFIG / CONSTANTS
 ***********************/
const firebaseConfig = {
  apiKey: "AIzaSyAt_ZOV74tm7NqcorhvsrM4pmBus0siirA",
  authDomain: "chocolate-studio-83bd2.firebaseapp.com",
  databaseURL: "https://chocolate-studio-83bd2-default-rtdb.firebaseio.com",
  projectId: "chocolate-studio-83bd2",
  storageBucket: "chocolate-studio-83bd2.firebasestorage.app",
  messagingSenderId: "1038955602034",
  appId: "1:1038955602034:web:bdba0c0a9be2eb"
};

let firebaseEnabled = false;
let db = null;

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  firebaseEnabled = true;
} catch (e) {
  console.warn("Firebase init failed", e);
}

/***********************
 * AUTO-GENERATED USER ID
 ***********************/
let userID = localStorage.getItem("tasterID");
if (!userID) {
  userID = "user_" + Math.random().toString(36).substring(2, 10);
  localStorage.setItem("tasterID", userID);
}
document.getElementById("userIdInput").value = userID;

/***********************
 * SESSION ID
 ***********************/
let sessionID = "";

/***********************
 * AROMA AXES + DESCRIPTORS
 ***********************/
const AROMA_AXES = [
  "Fruity",
  "Vegetal",
  "Floral/Spices",
  "Sweet/Dairy",
  "Nutty/Toasted/Roasted",
  "Cocoa"
];

const AROMA_COLORS = {
  "Fruity": "#d95f02",
  "Vegetal": "#1b9e77",
  "Floral/Spices": "#7570b3",
  "Sweet/Dairy": "#e6ab02",
  "Nutty/Toasted/Roasted": "#a6761d",
  "Cocoa": "#6a3d9a"
};

const AROMA_DESCRIPTORS_BY_AXIS = {
  "Fruity": [
    "Berry","Strawberry","Raspberry","Cherry","Blueberry","Blackberry","Cranberry",
    "Citrus","Orange","Lemon","Lime",
    "Stone Fruit","Peach","Plum","Apricot","Apple","Fig",
    "Dried Fruit","Date","Raisin","Prune",
    "Tropical Fruit","Mango","Banana","Passionfruit"
  ],
  "Vegetal": [
    "Earthy","Herb-like","Green","Hay-like","Olive","Mushroom","Tobacco","Smoked Wood"
  ],
  "Floral/Spices": [
    "Rose","Jasmine","Lavender","Chamomile",
    "Cinnamon","Nutmeg","Clove","Pepper","Anise","Bergamot","Licorice"
  ],
  "Sweet/Dairy": [
    "Vanilla","Coconut",
    "Maple Syrup","Molasses","Honey",
    "Caramel","Toffee","Burnt Sugar",
    "Milk","Cream","Butter","Yogurt"
  ],
  "Nutty/Toasted/Roasted": [
    "Hazelnut","Almond","Peanut","Walnut","Macadamia","Pecan",
    "Malt","Toast","Sweet Popcorn","Bran","Tortilla","Cereal/Grain",
    "Coffee","Smoky","Burnt"
  ],
  "Cocoa": ["Cocoa","Dark Chocolate","Cocoa Powder","Fermented"]
};

const BASIC_TASTES = ["Sweet","Sour","Bitter","Salty","Umami"];
const MOUTHFEEL_DESCRIPTORS = [
  "Creamy","Coarse","Soft","Melting","Sticky","Oily","Grainy",
  "Pungent","Astringent","Warm","Cool"
];

/***********************
 * STATE
 ***********************/
let currentChocolateId = null;
let currentTab = "my";

let myRatings = {
  basic: {},
  mouthfeel: new Set(),
  aromaValues: {},
  aromaWords: new Set()
};

/***********************
 * DOM ELEMENTS
 ***********************/
const sessionModal = document.getElementById("sessionModal");
const sessionInput = document.getElementById("sessionInput");
const startSessionBtn = document.getElementById("startSessionBtn");

const pageSelect = document.getElementById("page-select");
const pageRatings = document.getElementById("page-ratings");
const chocTitle = document.getElementById("choc-title");

const tabMy = document.getElementById("tab-my");
const tabAll = document.getElementById("tab-all");

const basicSlidersContainer = document.getElementById("basic-sliders");
const mouthfeelButtonsContainer = document.getElementById("mouthfeel-buttons");
const aromaSlidersContainer = document.getElementById("aroma-sliders");

const mouthfeelCloud = document.getElementById("mouthfeelCloud");
const aromaCloud = document.getElementById("aromaCloud");

/***********************
 * SESSION MODAL
 ***********************/
startSessionBtn.addEventListener("click", () => {
  const val = sessionInput.value.trim();
  if (!val) return;

  sessionID = val.toLowerCase(); // CASE-INSENSITIVE

  sessionModal.style.display = "none";
});

/***********************
 * CHARTS
 ***********************/
let basicRadarChart = null;
let aromaRadarChart = null;

function initCharts() {
  const basicCtx = document.getElementById("basicRadar").getContext("2d");
  const aromaCtx = document.getElementById("aromaRadar").getContext("2d");

  basicRadarChart = new Chart(basicCtx, {
    type: "radar",
    data: {
      labels: BASIC_TASTES,
      datasets: [{
        label: "My Ratings",
        data: BASIC_TASTES.map(() => 0),
        backgroundColor: "rgba(255,215,128,0.2)",
        borderColor: "#ffd780",
        borderWidth: 2
      }]
    },
    options: {
      scales: {
        r: {
          min: 0,
          max: 5,
          ticks: { stepSize: 1, color: "#f7e7d3" },
          grid: { color: "rgba(247,231,211,0.3)" },
          angleLines: { color: "rgba(247,231,211,0.3)" },
          pointLabels: { color: "#f7e7d3" }
        }
      },
      plugins: { legend: { display: false } }
    }
  });

  aromaRadarChart = new Chart(aromaCtx, {
    type: "radar",
    data: {
      labels: AROMA_AXES,
      datasets: [{
        label: "My Ratings",
        data: AROMA_AXES.map(() => 0),
        backgroundColor: "rgba(255,215,128,0.2)",
        borderColor: "#ffd780",
        borderWidth: 2
      }]
    },
    options: {
      scales: {
        r: {
          min: 0,
          max: 5,
          ticks: { stepSize: 1, color: "#f7e7d3" },
          grid: { color: "rgba(247,231,211,0.3)" },
          angleLines: { color: "rgba(247,231,211,0.3)" },
          pointLabels: { color: "#f7e7d3" }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

/***********************
 * UI BUILDERS
 ***********************/
function buildBasicSliders() {
  basicSlidersContainer.innerHTML = "";
  BASIC_TASTES.forEach(taste => {
    const div = document.createElement("div");
    div.className = "slider-group";
    div.innerHTML = `
      <label>${taste}</label>
      <input type="range" min="0" max="5" value="0" data-type="basic" data-key="${taste}">
    `;
    basicSlidersContainer.appendChild(div);
  });
}

function buildAromaDescriptorButtons(axis) {
  const container = document.createElement("div");
  container.className = "descriptor-buttons";

  const color = AROMA_COLORS[axis];

  AROMA_DESCRIPTORS_BY_AXIS[axis].forEach(word => {
    const btn = document.createElement("button");
    btn.textContent = word;
    btn.dataset.word = word;
    btn.style.background = color;

    if (axis === "Cocoa") btn.style.color = "white";

    btn.addEventListener("click", () => {
      if (myRatings.aromaWords.has(word)) {
        myRatings.aromaWords.delete(word);
        btn.classList.remove("selected");
      } else {
        myRatings.aromaWords.add(word);
        btn.classList.add("selected");
      }
      updateFirebase();
      updateClouds();
    });

    container.appendChild(btn);
  });

  aromaSlidersContainer.appendChild(container);
}

function buildAromaSliders() {
  aromaSlidersContainer.innerHTML = "";

  AROMA_AXES.forEach(axis => {
    const div = document.createElement("div");
    div.className = "slider-group";
    div.innerHTML = `
      <label>${axis}</label>
      <input type="range" min="0" max="5" value="0" data-type="aroma" data-key="${axis}">
    `;
    aromaSlidersContainer.appendChild(div);

    buildAromaDescriptorButtons(axis);
  });
}

function buildMouthfeelButtons() {
  mouthfeelButtonsContainer.innerHTML = "";
  MOUTHFEEL_DESCRIPTORS.forEach(word => {
    const btn = document.createElement("button");
    btn.textContent = word;
    btn.dataset.word = word;
    btn.style.background = "#2ec4b6";  // turquoise
    btn.style.color = "#00332e";

    btn.addEventListener("click", () => {
      if (myRatings.mouthfeel.has(word)) {
        myRatings.mouthfeel.delete(word);
        btn.classList.remove("selected");
      } else {
        myRatings.mouthfeel.add(word);
        btn.classList.add("selected");
      }
      updateFirebase();
      updateClouds();
    });

    mouthfeelButtonsContainer.appendChild(btn);
  });
}

/***********************
 * SLIDER EVENT HANDLERS
 ***********************/
function attachSliderListeners() {
  document.querySelectorAll('input[data-type="basic"]').forEach(slider => {
    slider.addEventListener("input", () => {
      const key = slider.dataset.key;
      const value = Number(slider.value);

      myRatings.basic[key] = value;

      const index = BASIC_TASTES.indexOf(key);
      basicRadarChart.data.datasets[0].data[index] = value;
      basicRadarChart.update();

      updateFirebase();
    });
  });

  document.querySelectorAll('input[data-type="aroma"]').forEach(slider => {
    slider.addEventListener("input", () => {
      const key = slider.dataset.key;
      const value = Number(slider.value);

      myRatings.aromaValues[key] = value;

      const index = AROMA_AXES.indexOf(key);
      aromaRadarChart.data.datasets[0].data[index] = value;
      aromaRadarChart.update();

      updateFirebase();
    });
  });
}

/***********************
 * EVENT LISTENERS
 ***********************/
document.querySelectorAll(".choc-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    loadChocolate(btn.dataset.chocId);
  });
});

function loadChocolate(chocId) {
  currentChocolateId = chocId;
  const btn = document.querySelector(`.choc-btn[data-choc-id="${chocId}"]`);
  chocTitle.textContent = btn.textContent;

  pageSelect.classList.add("hidden");
  pageRatings.classList.remove("hidden");

  initCharts();
  buildBasicSliders();
  buildAromaSliders();
  buildMouthfeelButtons();
  attachSliderListeners();
  loadGroupRatings();
}

tabMy.addEventListener("click", () => {
  currentTab = "my";
  tabMy.classList.add("active");
  tabAll.classList.remove("active");

  document.getElementById("basic-sliders").style.display = "block";
  document.getElementById("mouthfeel-buttons").style.display = "flex";
  document.getElementById("aroma-sliders").style.display = "block";

  document.getElementById("basic-plot-section").style.display = "block";
  document.getElementById("mouthfeel-cloud-section").style.display = "block";
  document.getElementById("aroma-plot-section").style.display = "block";
  document.getElementById("aroma-cloud-section").style.display = "block";
});

tabAll.addEventListener("click", () => {
  currentTab = "all";
  tabMy.classList.remove("active");
  tabAll.classList.add("active");

  document.getElementById("basic-sliders").style.display = "none";
  document.getElementById("mouthfeel-buttons").style.display = "none";
  document.getElementById("aroma-sliders").style.display = "none";

  document.getElementById("basic-plot-section").style.display = "block";
  document.getElementById("mouthfeel-cloud-section").style.display = "block";
  document.getElementById("aroma-plot-section").style.display = "block";
  document.getElementById("aroma-cloud-section").style.display = "block";
});

/***********************
 * CLOUDS
 ***********************/
function updateClouds() {
  mouthfeelCloud.textContent = Array.from(myRatings.mouthfeel).join(", ");
  aromaCloud.textContent = Array.from(myRatings.aromaWords).join(", ");
}

/***********************
 * GROUP AVERAGING
 ***********************/
function loadGroupRatings() {
  if (!firebaseEnabled) return;

  db.ref(`ratings/${sessionID}/${currentChocolateId}`).on("value", snapshot => {
    const all = snapshot.val();
    if (!all) return;

    const users = Object.values(all);

    const avgBasic = BASIC_TASTES.map(taste => {
      const vals = users.map(u => u.basic?.[taste] ?? 0);
      return vals.reduce((a,b)=>a+b,0) / vals.length;
    });

    const avgAroma = AROMA_AXES.map(axis => {
      const vals = users.map(u => u.aromaValues?.[axis] ?? 0);
      return vals.reduce((a,b)=>a+b,0) / vals.length;
    });

    if (currentTab === "all") {
      basicRadarChart.data.datasets[0].data = avgBasic;
      aromaRadarChart.data.datasets[0].data = avgAroma;
      basicRadarChart.update();
      aromaRadarChart.update();
    }

    const mouthfeelWords = {};
    const aromaWords = {};

    users.forEach(u => {
      (u.mouthfeel || []).forEach(w => mouthfeelWords[w] = (mouthfeelWords[w]||0)+1);
      (u.aromaWords || []).forEach(w => aromaWords[w] = (aromaWords[w]||0)+1);
    });

    mouthfeelCloud.textContent = Object.keys(mouthfeelWords).join(", ");
    aromaCloud.textContent = Object.keys(aromaWords).join(", ");
  });
}

/***********************
 * FIREBASE SYNC
 ***********************/
function updateFirebase() {
  if (!firebaseEnabled || !sessionID || !currentChocolateId) return;

  db.ref(`ratings/${sessionID}/${currentChocolateId}/${userID}`).set({
    basic: Object.fromEntries(Object.entries(myRatings.basic)),
    mouthfeel: Array.from(myRatings.mouthfeel),
        aromaValues: Object.fromEntries(Object.entries(myRatings.aromaValues)),
    aromaWords: Array.from(myRatings.aromaWords)
  });
}

/***********************
 * NAVIGATION BUTTONS
 ***********************/
const chocolates = ["choc1", "choc2", "choc3", "choc4"];

document.getElementById("nextChocolate").addEventListener("click", () => {
  const idx = chocolates.indexOf(currentChocolateId);
  const next = chocolates[(idx + 1) % chocolates.length];
  loadChocolate(next);
});

document.getElementById("prevChocolate").addEventListener("click", () => {
  const idx = chocolates.indexOf(currentChocolateId);
  const prev = chocolates[(idx - 1 + chocolates.length) % chocolates.length];
  loadChocolate(prev);
});
</script>
</body>
</html>
